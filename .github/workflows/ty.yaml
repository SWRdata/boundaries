name: ty

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tasks/make_boundaries/**"
      - "scripts/**"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tasks/make_boundaries/**"
      - "scripts/**"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # 8.1.0
        with:
          enable-cache: true
      - name: uv sync tasks
        working-directory: tasks/make_boundaries
        run: uv sync
      - name: ty check tasks
        working-directory: tasks/make_boundaries
        run: uvx ty check src
      - name: uv sync scripts
        working-directory: scripts
        run: uv sync
      - name: ty check scripts
        working-directory: scripts
        run: uvx ty check
