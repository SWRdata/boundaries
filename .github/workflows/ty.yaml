name: ty

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tasks/make_boundaries/**"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tasks/make_boundaries/**"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: uv sync
        working-directory: tasks/make_boundaries
        run: uv sync
      - name: ty check
        working-directory: tasks/make_boundaries
        run: uvx ty check src
      - name: uv sync
        working-directory: scripts
        run: uv sync
      - name: ty check
        working-directory: scripts
        run: uvx ty check
